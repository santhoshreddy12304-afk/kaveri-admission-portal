services:
  - type: web
    name: kaveri-admission-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: kaveri_production_secret_2026
      - key: CORS_ORIGIN
        value: "*"
